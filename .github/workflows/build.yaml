name: Build Home Menu

on:
  release:
    types: [created]

# ── Shared build logic lives in each job below ────────────────────────────────
# Two jobs run in parallel:
#   build-windows  →  HomeMenu-Windows-x64.zip   (.exe)
#   build-linux    →  HomeMenu-Linux-arm64.tar.gz (Raspberry Pi)

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  #  WINDOWS  (x64 EXE)
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Nativefier and serve
        run: npm install -g nativefier serve

      - name: Start local static server
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "npx" `
            -ArgumentList "serve", "--no-clipboard", "-l", "3000", "."
          $deadline = (Get-Date).AddSeconds(20)
          do {
            Start-Sleep -Milliseconds 500
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:3000" -UseBasicParsing -ErrorAction Stop
              Write-Host "Server up ($($r.StatusCode))"
              break
            } catch { Write-Host "Waiting…" }
          } while ((Get-Date) -lt $deadline)

      - name: Build Windows EXE
        shell: cmd
        run: |
          nativefier ^
            "http://localhost:3000/home-menu.html" ^
            dist ^
            --name "HomeMenu" ^
            --platform windows ^
            --arch x64 ^
            --single-instance ^
            --disable-dev-tools ^
            --inject preload-inject.js ^
            --browserwindow-options "{\"webPreferences\":{\"nodeIntegration\":true,\"contextIsolation\":false}}"

      - name: Zip Windows build
        shell: pwsh
        run: |
          $folder = Get-ChildItem -Path dist -Directory | Select-Object -First 1
          Compress-Archive -Path "$($folder.FullName)\*" `
            -DestinationPath "dist\HomeMenu-Windows-x64.zip"

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HomeMenu-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ════════════════════════════════════════════════════════════════════════════
  #  LINUX  (arm64 — Raspberry Pi 3/4/5)
  # ════════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Nativefier and serve
        run: npm install -g nativefier serve

      # Nativefier cross-compiles for arm64 from the ubuntu-latest x64 runner.
      # Wine is NOT needed for Linux targets.
      # We do need some Electron build dependencies though.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libnotify-dev libnss3 libxss1 \
            libasound2 libxtst6 xauth xvfb

      - name: Start local static server
        run: |
          npx serve --no-clipboard -l 3000 . &
          # Poll until ready
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000 > /dev/null && echo "Server up" && break
            sleep 1
          done

      - name: Build Linux arm64 app (Raspberry Pi)
        run: |
          nativefier \
            "http://localhost:3000/home-menu.html" \
            dist \
            --name "HomeMenu" \
            --platform linux \
            --arch arm64 \
            --single-instance \
            --disable-dev-tools \
            --inject preload-inject.js \
            --browserwindow-options '{"webPreferences":{"nodeIntegration":true,"contextIsolation":false}}'

      # Also make the .sh launchers executable inside the tarball
      - name: Bundle Linux launcher scripts + tar the build
        run: |
          FOLDER=$(ls -d dist/HomeMenu-linux-arm64)
          # Copy the Linux launcher scripts into the app folder for reference
          mkdir -p "$FOLDER/launchers-linux"
          cp launchers-linux/*.sh "$FOLDER/launchers-linux/"
          chmod +x "$FOLDER/launchers-linux/"*.sh
          # Tar preserving permissions (important for the executable bit)
          tar -czf dist/HomeMenu-Linux-arm64.tar.gz -C dist HomeMenu-linux-arm64

      - name: Upload Linux release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HomeMenu-Linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
