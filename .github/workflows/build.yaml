name: Build Home Menu EXE

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Node.js (Nativefier requires ≥ 16) ──────────────────────────────
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ── 3. Install Nativefier + local static server ─────────────────────────
      - name: Install tools
        run: npm install -g nativefier serve

      # ── 4. Serve HTML locally, then build EXE ───────────────────────────────
      #
      #   Nativefier requires a URL (not a local file path), so we spin up a
      #   tiny static server in the background pointing at the repo root, then
      #   pass http://localhost:3000/home-menu.html as the target URL.
      #
      #   The --inject flags bundle the .bat launchers into the Electron app
      #   under resources/app/launchers/ so the JS href paths still resolve.
      #
      - name: Start local server
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath "npx" -ArgumentList "serve", "-l", "3000", "."
          Start-Sleep -Seconds 4   # give the server a moment to start

      - name: Build EXE
        shell: cmd
        run: |
          nativefier ^
            "http://localhost:3000/home-menu.html" ^
            dist ^
            --name "HomeMenu" ^
            --platform windows ^
            --arch x64 ^
            --single-instance ^
            --disable-dev-tools ^
            --inject launchers/launch-file-explorer.bat ^
            --inject launchers/launch-microsoft-edge.bat ^
            --inject launchers/launch-notepad.bat ^
            --inject launchers/launch-calculator.bat

      # ── 5. Locate and zip the output ────────────────────────────────────────
      - name: Zip output folder
        shell: pwsh
        run: |
          $folder = Get-ChildItem -Path dist -Directory | Select-Object -First 1
          Compress-Archive -Path "$($folder.FullName)\*" -DestinationPath "dist\HomeMenu-Windows-x64.zip"
          Write-Host "Zipped: dist\HomeMenu-Windows-x64.zip"

      # ── 6. Upload as release asset ──────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HomeMenu-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
