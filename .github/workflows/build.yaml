name: Build Home Menu EXE

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Node.js (Nativefier requires ≥ 16) ──────────────────────────────
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ── 3. Install Nativefier ───────────────────────────────────────────────
      - name: Install Nativefier
        run: npm install -g nativefier

      # ── 4. Package into a Windows EXE ──────────────────────────────────────
      #
      #   --inject: injects extra files (the launchers folder) into the app
      #   --internal-urls: keeps navigation inside the Nativefier window
      #   Note: Nativefier wraps a LOCAL html file; we point it at the
      #         home-menu.html using a file:// URL trick via --browserwindow-options
      #
      - name: Build EXE
        shell: cmd
        run: |
          nativefier ^
            --name "HomeMenu" ^
            --platform windows ^
            --arch x64 ^
            --out dist ^
            --single-instance ^
            --disable-dev-tools ^
            --inject launchers/launch-file-explorer.bat ^
            --inject launchers/launch-microsoft-edge.bat ^
            --inject launchers/launch-notepad.bat ^
            --inject launchers/launch-calculator.bat ^
            "home-menu.html"

      # ── 5. Locate and zip the output ────────────────────────────────────────
      - name: Zip output folder
        shell: pwsh
        run: |
          $folder = Get-ChildItem -Path dist -Directory | Select-Object -First 1
          Compress-Archive -Path "$($folder.FullName)\*" -DestinationPath "dist\HomeMenu-Windows-x64.zip"
          Write-Host "Zipped: dist\HomeMenu-Windows-x64.zip"

      # ── 6. Upload as release asset ──────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HomeMenu-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
